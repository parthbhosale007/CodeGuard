<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeGuard — AI Code Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- ============================================================
       STYLES
  ============================================================ -->
  <style>
    /* ── Reset & Variables ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --bg2:         #0a0e14;
      --card:        #161b22;
      --card2:       #1c2230;
      --border:      #21262d;
      --border2:     #30363d;
      --accent:      #58a6ff;
      --accent-glow: rgba(88,166,255,.18);
      --accent2:     #3b82f6;
      --text:        #e6edf3;
      --muted:       #7d8590;
      --muted2:      #484f58;
      --critical:    #f85149;
      --high:        #f0883e;
      --medium:      #d29922;
      --low:         #3fb950;
      --info:        #58a6ff;
      --font-mono:   'JetBrains Mono', 'Fira Code', monospace;
      --font-ui:     'Syne', sans-serif;
      --radius:      10px;
      --radius-lg:   16px;
      --transition:  0.22s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Subtle grid background ─────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .25;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(88,166,255,.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout wrapper ─────────────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      padding: 40px 0 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .brand { display: flex; align-items: center; gap: 14px; }

    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #1f3a5f, #0d1f3c);
      border: 1px solid rgba(88,166,255,.35);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(88,166,255,.15);
    }

    .brand-text h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.3px;
      color: #fff;
    }

    .brand-text span {
      display: block;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 1px;
      letter-spacing: .4px;
    }

    .header-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(63,185,80,.08);
      border: 1px solid rgba(63,185,80,.25);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--low);
      letter-spacing: .3px;
    }

    .header-badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--low);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--low);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .6; transform: scale(.85); }
    }

    /* ── Main grid ──────────────────────────────────────────────── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 860px) {
      .workspace { grid-template-columns: 1fr; }
    }

    /* ── Panel card ─────────────────────────────────────────────── */
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.02);
    }

    .panel-title {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .4px;
    }

    .panel-title .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }

    .panel-actions { display: flex; gap: 6px; }

    /* ── Icon buttons ───────────────────────────────────────────── */
    .icon-btn {
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 5px 10px;
      transition: all var(--transition);
      display: flex; align-items: center; gap: 5px;
      letter-spacing: .3px;
    }

    .icon-btn:hover {
      background: var(--card2);
      border-color: var(--border2);
      color: var(--text);
    }

    .icon-btn:active { transform: scale(.96); }

    /* ── Code textarea ──────────────────────────────────────────── */
    .code-editor-wrap {
      position: relative;
    }

    .line-numbers {
      position: absolute;
      top: 0; left: 0;
      width: 42px;
      height: 100%;
      padding: 16px 0;
      display: flex; flex-direction: column; align-items: flex-end;
      pointer-events: none;
      user-select: none;
    }

    .line-numbers span {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 21px;
      color: var(--muted2);
      padding-right: 10px;
    }

    #codeInput {
      width: 100%;
      min-height: 360px;
      background: transparent;
      border: none;
      outline: none;
      resize: vertical;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 21px;
      color: var(--text);
      padding: 16px 16px 16px 52px;
      caret-color: var(--accent);
      tab-size: 2;
    }

    #codeInput::placeholder { color: var(--muted2); }
    #codeInput::selection  { background: rgba(88,166,255,.22); }

    /* ── Analyze button ─────────────────────────────────────────── */
    .analyze-wrap {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,.015);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }

    .char-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted2);
    }

    #analyzeBtn {
      background: linear-gradient(135deg, #1a4a8a, var(--accent2));
      border: 1px solid rgba(88,166,255,.4);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .4px;
      padding: 10px 24px;
      transition: all var(--transition);
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 0 20px rgba(88,166,255,.12);
    }

    #analyzeBtn:hover:not(:disabled) {
      background: linear-gradient(135deg, #1d56a3, #4a90e2);
      box-shadow: 0 0 30px rgba(88,166,255,.28);
      transform: translateY(-1px);
    }

    #analyzeBtn:active:not(:disabled) { transform: translateY(0); }

    #analyzeBtn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Spinner ────────────────────────────────────────────────── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #analyzeBtn.loading .btn-icon  { display: none; }
    #analyzeBtn.loading .spinner   { display: block; }

    /* ── Output panel ───────────────────────────────────────────── */
    #outputPanel {
      min-height: 420px;
      max-height: 600px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* scrollbar */
    #outputPanel::-webkit-scrollbar { width: 6px; }
    #outputPanel::-webkit-scrollbar-track { background: transparent; }
    #outputPanel::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    /* ── Empty / placeholder state ──────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      opacity: .4;
      padding: 40px 0;
      text-align: center;
    }

    .empty-state svg { opacity: .5; }

    .empty-state p {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── Severity badge ─────────────────────────────────────────── */
    .severity-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .5px;
    }

    .severity-CRITICAL {
      background: rgba(248,81,73,.12);
      border: 1px solid rgba(248,81,73,.35);
      color: var(--critical);
    }
    .severity-HIGH {
      background: rgba(240,136,62,.12);
      border: 1px solid rgba(240,136,62,.35);
      color: var(--high);
    }
    .severity-MEDIUM {
      background: rgba(210,153,34,.12);
      border: 1px solid rgba(210,153,34,.35);
      color: var(--medium);
    }
    .severity-LOW {
      background: rgba(63,185,80,.12);
      border: 1px solid rgba(63,185,80,.35);
      color: var(--low);
    }
    .severity-INFO {
      background: rgba(88,166,255,.12);
      border: 1px solid rgba(88,166,255,.35);
      color: var(--info);
    }

    /* ── Result sections ────────────────────────────────────────── */
    .result-section {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp .35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-section:nth-child(2) { animation-delay: .06s; }
    .result-section:nth-child(3) { animation-delay: .12s; }
    .result-section:nth-child(4) { animation-delay: .18s; }

    .result-section-header {
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255,255,255,.025);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 7px;
    }

    .result-list {
      list-style: none;
      padding: 10px 0;
    }

    .result-list li {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    .result-list li:last-child { border-bottom: none; }

    .result-list li:hover { background: rgba(255,255,255,.025); }

    .result-list li::before {
      content: '›';
      color: var(--accent);
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .li-security::before { color: var(--critical); content: '⚠'; font-size: 11px; }
    .li-suggestion::before { color: var(--low); content: '✦'; font-size: 10px; }

    /* ── Error state ────────────────────────────────────────────── */
    .error-box {
      background: rgba(248,81,73,.07);
      border: 1px solid rgba(248,81,73,.3);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--critical);
      display: flex; align-items: flex-start; gap: 10px;
      animation: fadeUp .3s ease;
    }

    /* ── Loading skeleton ───────────────────────────────────────── */
    .skeleton-wrap { display: flex; flex-direction: column; gap: 14px; animation: fadeUp .3s ease; }

    .skeleton {
      background: linear-gradient(90deg, var(--card2) 25%, var(--border) 50%, var(--card2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Summary row ────────────────────────────────────────────── */
    .summary-row {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
    }

    .score-pill {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
    }

    /* ── Notification toast ─────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--card2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 18px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--low);
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
      transform: translateY(16px);
      opacity: 0;
      transition: all .3s ease;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer {
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted2);
      letter-spacing: .3px;
    }

    footer a { color: var(--muted); text-decoration: none; transition: color var(--transition); }
    footer a:hover { color: var(--accent); }
  </style>
</head>

<body>
  <!-- ============================================================
       MARKUP
  ============================================================ -->
  <div class="app">

    <!-- Header -->
    <header>
      <div class="brand">
        <div class="brand-icon">🛡️</div>
        <div class="brand-text">
          <h1>CodeGuard</h1>
          <span>AI-powered CI/CD Code Review Tool</span>
        </div>
      </div>
      <div class="header-badge">Model Active</div>
    </header>

    <!-- Two-column workspace -->
    <div class="workspace">

      <!-- LEFT: Code Input Panel -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
            &nbsp;main.py
          </div>
          <div class="panel-actions">
            <button class="icon-btn" id="clearBtn" title="Clear input">✕ Clear</button>
          </div>
        </div>

        <!-- Editor area -->
        <div class="code-editor-wrap">
          <div class="line-numbers" id="lineNumbers"></div>
          <textarea
            id="codeInput"
            spellcheck="false"
            autocomplete="off"
            placeholder="# Paste your code here…
# CodeGuard will analyze it for:
#  • Security vulnerabilities
#  • Logic errors & code smells
#  • Best practice violations
#  • Performance issues"
          ></textarea>
        </div>

        <!-- Action row -->
        <div class="analyze-wrap">
          <span class="char-count" id="charCount">0 chars</span>
          <button id="analyzeBtn">
            <span class="btn-icon">⚡</span>
            <div class="spinner"></div>
            Analyze Code
          </button>
        </div>
      </div>

      <!-- RIGHT: Output Panel -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
            &nbsp;Analysis Report
          </div>
          <div class="panel-actions">
            <button class="icon-btn" id="copyBtn" title="Copy output">⎘ Copy</button>
          </div>
        </div>

        <div id="outputPanel">
          <!-- Empty state shown initially -->
          <div class="empty-state" id="emptyState">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <p>Paste your code on the left<br>and click <strong>Analyze Code</strong><br>to get an AI-powered review.</p>
          </div>
        </div>
      </div>

    </div><!-- /workspace -->

    <footer>
      Built with ♥ · Powered by <a href="#">CodeGuard AI</a> · v1.0.0
    </footer>
  </div>

  <!-- Toast notification -->
  <div id="toast">✓ Copied to clipboard</div>

  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script>
    /* ── DOM refs ────────────────────────────────────────────── */
    const codeInput   = document.getElementById('codeInput');
    const analyzeBtn  = document.getElementById('analyzeBtn');
    const clearBtn    = document.getElementById('clearBtn');
    const copyBtn     = document.getElementById('copyBtn');
    const outputPanel = document.getElementById('outputPanel');
    const emptyState  = document.getElementById('emptyState');
    const lineNumbers = document.getElementById('lineNumbers');
    const charCount   = document.getElementById('charCount');
    const toast       = document.getElementById('toast');

    /* ── Prefill example code ────────────────────────────────── */
    const EXAMPLE_CODE = `import sqlite3
import hashlib

DB_PASSWORD = "admin123"   # ← hardcoded secret

def get_user(username):
    conn = sqlite3.connect("users.db")
    cursor = conn.cursor()
    # ← SQL injection risk
    query = "SELECT * FROM users WHERE name = '" + username + "'"
    cursor.execute(query)
    return cursor.fetchone()

def store_password(plain_text):
    # ← storing plain-text password
    conn = sqlite3.connect("users.db")
    cursor = conn.cursor()
    cursor.execute("INSERT INTO users (pw) VALUES (?)", (plain_text,))
    conn.commit()`;

    codeInput.value = EXAMPLE_CODE;
    updateLineNumbers();
    updateCharCount();

    /* ── Line numbers ────────────────────────────────────────── */
    function updateLineNumbers() {
      const lines = codeInput.value.split('\n').length;
      lineNumbers.innerHTML = Array.from({ length: lines }, (_, i) =>
        `<span>${i + 1}</span>`
      ).join('');
    }

    function updateCharCount() {
      charCount.textContent = `${codeInput.value.length} chars`;
    }

    codeInput.addEventListener('input', () => {
      updateLineNumbers();
      updateCharCount();
    });

    codeInput.addEventListener('keydown', e => {
      // Tab key → insert 2 spaces
      if (e.key === 'Tab') {
        e.preventDefault();
        const { selectionStart, selectionEnd } = codeInput;
        codeInput.value =
          codeInput.value.substring(0, selectionStart) + '  ' +
          codeInput.value.substring(selectionEnd);
        codeInput.selectionStart = codeInput.selectionEnd = selectionStart + 2;
        updateLineNumbers();
      }
    });

    /* ── Sync textarea scroll → line numbers ─────────────────── */
    codeInput.addEventListener('scroll', () => {
      lineNumbers.scrollTop = codeInput.scrollTop;
    });

    /* ── Clear button ────────────────────────────────────────── */
    clearBtn.addEventListener('click', () => {
      codeInput.value = '';
      updateLineNumbers();
      updateCharCount();
      resetOutput();
      codeInput.focus();
    });

    /* ── Copy button ─────────────────────────────────────────── */
    copyBtn.addEventListener('click', () => {
      const text = outputPanel.innerText.trim();
      if (!text || outputPanel.querySelector('.empty-state')) return;
      navigator.clipboard.writeText(text).then(() => showToast('✓ Copied to clipboard'));
    });

    /* ── Toast helper ────────────────────────────────────────── */
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    /* ── Reset output to empty state ─────────────────────────── */
    function resetOutput() {
      outputPanel.innerHTML = `
        <div class="empty-state" id="emptyState">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <p>Paste your code on the left<br>and click <strong>Analyze Code</strong><br>to get an AI-powered review.</p>
        </div>`;
    }

    /* ── Loading skeleton ────────────────────────────────────── */
    function showSkeleton() {
      outputPanel.innerHTML = `
        <div class="skeleton-wrap">
          <div class="skeleton" style="height:36px;width:55%"></div>
          <div class="skeleton" style="height:18px;width:80%"></div>
          <div class="skeleton" style="height:18px;width:65%"></div>
          <div class="skeleton" style="height:18px;width:72%"></div>
          <div class="skeleton" style="height:18px;width:50%"></div>
          <div class="skeleton" style="height:18px;width:68%"></div>
        </div>`;
    }

    /* ── Severity helpers ────────────────────────────────────── */
    const SEVERITY_ICON = {
      CRITICAL: '❌', HIGH: '🔴', MEDIUM: '🟠', LOW: '🟢', INFO: '🔵'
    };

    function severityClass(s = '') {
      const map = { CRITICAL:'CRITICAL', HIGH:'HIGH', MEDIUM:'MEDIUM', LOW:'LOW', INFO:'INFO' };
      return map[s.toUpperCase()] || 'INFO';
    }

    /* ── Parse the API response into structured data ─────────── */
    function parseResponse(raw) {
      /*
        The /review endpoint may return different shapes.
        We try to handle: plain string, { review }, { result },
        { severity, issues, security, suggestions }, etc.
      */
      if (typeof raw === 'string') return parseText(raw);

      // If already structured
      if (raw.severity || raw.issues || raw.security || raw.suggestions) {
        return {
          severity:    raw.severity   || 'INFO',
          issues:      ensureArray(raw.issues),
          security:    ensureArray(raw.security || raw.security_warnings),
          suggestions: ensureArray(raw.suggestions),
          summary:     raw.summary    || raw.message || '',
        };
      }

      // Fallback: coerce whatever string-ish field exists
      const text =
        raw.review || raw.result || raw.output || raw.message ||
        JSON.stringify(raw, null, 2);
      return parseText(text);
    }

    function ensureArray(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      if (typeof val === 'string') return val.split('\n').map(s => s.replace(/^[-•*]\s*/, '').trim()).filter(Boolean);
      return [String(val)];
    }

    /* Simple heuristic parser for free-text responses */
    function parseText(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      let severity = 'INFO';
      const issues = [], security = [], suggestions = [];
      let current = null;

      const SEV_RE = /severity[:\s]+([A-Z]+)/i;

      lines.forEach(line => {
        const sevMatch = line.match(SEV_RE);
        if (sevMatch) { severity = sevMatch[1].toUpperCase(); return; }

        if (/issues?:/i.test(line))      { current = 'issues';      return; }
        if (/security/i.test(line))       { current = 'security';    return; }
        if (/suggestion|recommend/i.test(line)) { current = 'suggestions'; return; }

        const clean = line.replace(/^[-•*\d.]+\s*/, '');
        if (!clean) return;

        if (current === 'issues')      issues.push(clean);
        else if (current === 'security')    security.push(clean);
        else if (current === 'suggestions') suggestions.push(clean);
        // else ignore
      });

      return { severity, issues, security, suggestions, summary: '' };
    }

    /* ── Render the structured result ────────────────────────── */
    function renderResult(data) {
      const sev   = severityClass(data.severity);
      const icon  = SEVERITY_ICON[sev] || '🔵';

      const issueItems      = renderList(data.issues, 'issue');
      const securityItems   = renderList(data.security, 'security');
      const suggestionItems = renderList(data.suggestions, 'suggestion');

      outputPanel.innerHTML = `
        <!-- Severity badge -->
        <div class="summary-row">
          <span class="severity-badge severity-${sev}">
            ${icon} Severity: ${sev}
          </span>
          ${data.issues.length || data.security.length
            ? `<span class="score-pill">${data.issues.length + data.security.length} finding(s)</span>`
            : ''}
        </div>

        ${data.issues.length ? `
        <div class="result-section">
          <div class="result-section-header">
            <span>⚡</span> Issues &amp; Code Smells
          </div>
          <ul class="result-list">${issueItems}</ul>
        </div>` : ''}

        ${data.security.length ? `
        <div class="result-section">
          <div class="result-section-header">
            <span>🔒</span> Security Warnings
          </div>
          <ul class="result-list">${securityItems}</ul>
        </div>` : ''}

        ${data.suggestions.length ? `
        <div class="result-section">
          <div class="result-section-header">
            <span>💡</span> Suggestions
          </div>
          <ul class="result-list">${suggestionItems}</ul>
        </div>` : ''}

        ${(!data.issues.length && !data.security.length && !data.suggestions.length) ? `
        <div class="result-section">
          <div class="result-section-header"><span>📋</span> Raw Analysis</div>
          <ul class="result-list">
            <li>${escHtml(data.summary || 'No structured output returned.')}</li>
          </ul>
        </div>` : ''}
      `;
    }

    function renderList(items, type) {
      const cls = type === 'security' ? 'li-security' : type === 'suggestion' ? 'li-suggestion' : '';
      return items.map(item => `<li class="${cls}">${escHtml(item)}</li>`).join('');
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Error display ────────────────────────────────────────── */
    function showError(msg) {
      outputPanel.innerHTML = `
        <div class="error-box">
          <span>⚠</span>
          <span>${escHtml(msg)}</span>
        </div>`;
    }

    /* ── Main: Analyze button click ──────────────────────────── */
    analyzeBtn.addEventListener('click', async () => {
      const code = codeInput.value.trim();
      if (!code) {
        showToast('⚠ Please paste some code first');
        codeInput.focus();
        return;
      }

      // Enter loading state
      analyzeBtn.disabled = true;
      analyzeBtn.classList.add('loading');
      analyzeBtn.lastElementChild.textContent = 'Analyzing…';
      showSkeleton();

      try {
        const res = await fetch('https://codeguard-qid9.onrender.com/review', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });

        if (!res.ok) {
          throw new Error(`Server responded with ${res.status} ${res.statusText}`);
        }

        const json = await res.json();
        const data = parseResponse(json);
        renderResult(data);

      } catch (err) {
        console.error('[CodeGuard]', err);
        showError(
          err.message.includes('Failed to fetch')
            ? 'Could not reach the CodeGuard server. Check your connection and try again.'
            : err.message
        );
      } finally {
        // Exit loading state
        analyzeBtn.disabled = false;
        analyzeBtn.classList.remove('loading');
        analyzeBtn.lastElementChild.textContent = 'Analyze Code';
      }
    });

    // Allow Ctrl/Cmd+Enter to trigger analysis
    codeInput.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyzeBtn.click();
    });
  </script>
</body>
</html>
